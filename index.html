<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <h1>IOS Calculator Project</h1>
    <h2>Final Project of T.O.P. Foundations</h2>

<div class = "calculator">
    <div class = "calcBtns">
            <div id = "input"></div>
        <div class= "row">
        <button id = "btnDel">⌫</button>
        <button id = "btnC"><b>C</b></button>
        <button id = "btnDot"><b>.</b></button>
        <button class="operator" data-operator="/"><b>÷</b></button>
        </div>
        <div class= "row">
        <button class = "digit" id = "btn7"><b>7</b></button>
        <button class = "digit" id = "btn8"><b>8</b></button>
        <button class = "digit" id = "btn9"><b>9</b></button>
        <button class="operator" data-operator="*">×</button>
        </div>
        <div class= "row">
        <button class = "digit" id = "btn4"><b>4</b></button>
        <button class = "digit" id = "btn5"><b>5</b></button>
        <button class = "digit" id = "btn6"><b>6</b></button>
        <button class="operator" data-operator="-"><b>-</b></button>
        </div>
        <div class= "row">
        <button class = "digit" id = "btn1"><b>1</b></button>
        <button class = "digit" id = "btn2"><b>2</b></button>
        <button class = "digit" id = "btn3"><b>3</b></button>
        <button class="operator" data-operator="+"><b>+</b></button>
        </div>
        <div class= "row">
        <button id = "btnPlusMinus"><b>±</b></button>
        <button class = "digit" id = "btn0"><b>0</b></button>
        <button id = "btnEqual"><b>=</b></button>
        </div>
    </div>
</div>
</body>
</html>
